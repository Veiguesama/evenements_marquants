/* ── MAIN LAYOUT ── */

.cal-month-label {

.cal-settings-btn {

.cal-day.today .cal-day-num { background: #1a73e8; color: #fff; font-weight: 700; }
.cal-day.other-month .cal-day-num { color: #ccc; }
.cal-events-layer { position: absolute; top: 24px; left: 0; right: 0; pointer-events: none; }
.cal-event-bar {

.cal-event-bar:hover { filter: brightness(1.15); z-index: 10; }

.cal-event-bar.r-right { border-radius: 2px 3px 3px 2px; }

.cal-event-bar.selected { outline: 2px solid #fff; filter: brightness(1.2); z-index: 10; }

.cal-legend { display: flex; gap: 10px; flex-wrap: wrap; padding: 8px 10px; border-top: 1px solid #eee; font-size: 10px; color: #666; flex-shrink: 0; }
.cal-legend-item { display: flex; align-items: center; gap: 4px; }
.cal-legend-dot { width: 9px; height: 9px; border-radius: 2px; }

.stg-toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }

.stg-toggle input:checked + .stg-slider { background: #16a085; }
.stg-toggle input:checked + .stg-slider::before { transform: translateX(16px); }
.settings-reset { margin-top: 14px; background: #f5f5f5; border: 1px solid #ddd; border-radius: 6px; padding: 6px 14px; font-size: 11px; font-weight: 600; color: #555; cursor: pointer; font-family: Arial, sans-serif; }

const CAL_DEF = { cats:{ manif:true, travaux:true, horaires:true, divers:false, news:false }, statuts:{ ok:true, deviation:true, suppression:true, info:true } };
function loadS() { try { const r=localStorage.getItem(CAL_KEY); if(!r) return JSON.parse(JSON.stringify(CAL_DEF)); const s=JSON.parse(r); return { cats:Object.assign({},CAL_DEF.cats,s.cats||{}), statuts:Object.assign({},CAL_DEF.statuts,s.statuts||{}) }; } catch { return JSON.parse(JSON.stringify(CAL_DEF)); } }
function saveS(s) { try { localStorage.setItem(CAL_KEY,JSON.stringify(s)); } catch {} }
let CAL_S = loadS();

// ════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════
const MOIS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const BAR_H=15, BAR_GAP=2;
let calY=new Date().getFullYear(), calM=new Date().getMonth();

function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function sd(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function gc(ev){return STATUT_COLORS[ev.statut]||'#888';}
function fmtR(d1s,d2s){const a=pd(d1s),b=pd(d2s);const f=d=>`${d.getDate()} ${MOIS[d.getMonth()].slice(0,3)}. ${d.getFullYear()}`;return sd(a,b)?f(a):`${f(a)} → ${f(b)}`;}

function buildEvents() {
    const ev=[];
    ['manif','travaux','horaires','divers','news'].forEach(cat=>{
        if(!CAL_S.cats[cat]) return;
        (DATA[cat]||[]).forEach(sec=>sec.items.forEach(item=>{
            if(item.debut&&item.fin){
                if(!CAL_S.statuts[item.statut]) return;
                ev.push({ id:(item.titre+item.debut).replace(/[^a-zA-Z0-9]/g,'').slice(0,32), titre:item.titre, debut:item.debut, fin:item.fin, statut:item.statut, lignes:item.lignes||[], cat, heure:item.date||'', geste:item.geste||'', details:Array.isArray(item.details)?item.details.join(' '):(item.details||'') });
            }
        }));
    });
    return ev;
}

// ════════════════════════════════════════════════════════════
//  TABS (right panel)
// ════════════════════════════════════════════════════════════
function buildTabs() {
    const bar = document.getElementById('tabs-bar');
    const content = document.getElementById('tabs-content');
    bar.innerHTML = ''; content.innerHTML = '';

    TABS_CONFIG.forEach((tab, i) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (i===0?' active':'');
        btn.style.setProperty('--tc', tab.color);
        btn.textContent = tab.label;
        btn.dataset.tab = tab.id;
        btn.addEventListener('click', () => {
            bar.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            content.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
            btn.classList.add('active');
            content.querySelector(`.tab-pane[data-tab="${tab.id}"]`).classList.add('active');
        });
        bar.appendChild(btn);

        const pane = document.createElement('div');
        pane.className = 'tab-pane' + (i===0?' active':'');
        pane.dataset.tab = tab.id;

        const linkLabel = tab.id==='presse' ? '🔗 Lien' : '🔗 GestE';
        (DATA[tab.id]||[]).forEach(sec => {
            const secEl = document.createElement('div');
            const itemsHTML = sec.items.map(item => {
                const meta = STATUT_META[item.statut]||STATUT_META.info;
                const lignesHTML = (item.lignes||[]).map(l=>`<span class="evt-ligne">${l}</span>`).join('');
                const detailsHTML = (item.details||[]).map(d=>`<div class="evt-detail">${d}</div>`).join('');
                const srcHTML = tab.id==='presse'&&item.date ? `<div class="evt-source">📰 ${item.date}</div>` : '';
                const gesteHTML = item.geste ? `<a class="evt-link" href="${item.geste}" target="_blank">${linkLabel}</a>` : '';
                const stableId = item.debut ? (item.titre+item.debut).replace(/[^a-zA-Z0-9]/g,'').slice(0,32) : '';
                const calBtnHTML = item.debut && tab.id!=='presse' ? `<button class="evt-link" style="cursor:pointer;border:none;" data-goto="${item.debut}" data-evid="${stableId}" title="Voir dans le calendrier">📆</button>` : '';
                return `<div class="evt-item" id="item-${stableId}" style="border-left-color:${meta.color};background:${meta.bg};">
                    <div class="evt-item-head">
                        <div class="evt-item-title">${item.titre}</div>
                        <div class="evt-item-actions">
                            ${item.date&&tab.id!=='presse'?`<div class="evt-item-date">📅 ${item.date}</div>`:''}
                            ${calBtnHTML}${gesteHTML}
                        </div>
                    </div>
                    <div class="evt-item-meta"><span class="evt-badge" style="background:${meta.border};color:${meta.color};">${meta.label}</span>${lignesHTML}</div>
                    ${srcHTML}
                    ${detailsHTML?`<div class="evt-details">${detailsHTML}</div>`:''}
                </div>`;
            }).join('');
            secEl.innerHTML = `<div class="section-label">${sec.semaine}</div>${itemsHTML}`;
            pane.appendChild(secEl);
        });

        // Cal btn handlers
        pane.querySelectorAll('[data-goto]').forEach(btn => {
            btn.addEventListener('click', e => {
                e.preventDefault();
                const d = pd(btn.dataset.goto);
                calY = d.getFullYear(); calM = d.getMonth();
                renderCal();
                setTimeout(() => {
                    document.querySelectorAll(`.cal-event-bar[data-evid="${btn.dataset.evid}"]`).forEach(b => {
                        b.classList.add('selected');
                        b.scrollIntoView({behavior:'smooth',block:'center'});
                        setTimeout(()=>b.classList.remove('selected'),2000);
                    });
                }, 50);
            });
        });

        content.appendChild(pane);
    });
}

// Navigate to item from search
function goToItem(tabId, titre) {
    const bar = document.getElementById('tabs-bar');
    const content = document.getElementById('tabs-content');
    bar.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    content.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
    const btn = bar.querySelector(`.tab-btn[data-tab="${tabId}"]`);
    const pane = content.querySelector(`.tab-pane[data-tab="${tabId}"]`);
    if(btn) btn.classList.add('active');
    if(pane) {
        pane.classList.add('active');
        const items = pane.querySelectorAll('.evt-item-title');
        for(const el of items) {
            if(el.textContent.trim()===titre||el.textContent.trim().startsWith(titre.slice(0,30))) {
                el.closest('.evt-item').scrollIntoView({behavior:'smooth',block:'center'});
                el.closest('.evt-item').classList.add('highlighted');
                setTimeout(()=>el.closest('.evt-item').classList.remove('highlighted'),2000);
                break;
            }
        }
    }
}

// ════════════════════════════════════════════════════════════
//  SEARCH
// ════════════════════════════════════════════════════════════
function buildSearch() {
    const input = document.getElementById('top-search');
    const results = document.getElementById('top-search-results');
    const allItems = [];
    ['manif','travaux','horaires','divers','news'].forEach(tabId => {
        (DATA[tabId]||[]).forEach(sec=>sec.items.forEach(item=>allItems.push({...item,tabId})));
    });
    const tabLabels = { manif:'🎪', travaux:'🚧', horaires:'🕐', divers:'📋', news:'📣' };

    function doSearch() {
        const q = input.value.trim().toLowerCase();
        if(!q) { results.classList.remove('open'); return; }
        const filtered = allItems.filter(item => {
            return [item.titre,item.date,...(item.details||[]),...(item.lignes||[])].join(' ').toLowerCase().includes(q);
        }).slice(0,12);
        if(!filtered.length) {
            results.innerHTML = '<div class="sr-empty">Aucun résultat.</div>';
        } else {
            results.innerHTML = filtered.map(item => {
                const meta = STATUT_META[item.statut]||STATUT_META.info;
                const lignes = (item.lignes||[]).map(l=>`<span class="evt-ligne" style="font-size:9px;padding:1px 3px;">${l}</span>`).join('');
                return `<div class="sr-item" data-tab="${item.tabId}" data-titre="${item.titre.replace(/"/g,'&quot;')}">
                    <div class="sr-item-title"><span class="sr-cat">${tabLabels[item.tabId]||''} ${item.tabId}</span>${item.titre}</div>
                    <div class="sr-item-meta">${item.date?`📅 ${item.date} · `:''}${lignes} <span style="color:${meta.color}">${meta.label}</span></div>
                </div>`;
            }).join('');
        }
        results.classList.add('open');
        results.querySelectorAll('.sr-item').forEach(r => {
            r.addEventListener('click', () => {
                goToItem(r.dataset.tab, r.dataset.titre);
                input.value = '';
                results.classList.remove('open');
            });
        });
    }

    input.addEventListener('input', doSearch);
    input.addEventListener('keydown', e => { if(e.key==='Escape'){input.value='';results.classList.remove('open');} });
    document.addEventListener('click', e => { if(!e.target.closest('.topbar-search-wrap')) results.classList.remove('open'); });
}

// ════════════════════════════════════════════════════════════
//  CALENDAR
// ════════════════════════════════════════════════════════════
const popup = document.getElementById('cal-popup');
let popPinned = false;

function showPopup(e, ev, pin=false) {
    if(popPinned&&!pin) return;
    if(pin) popPinned=true;
    const meta=STATUT_META[ev.statut]||STATUT_META.info, color=gc(ev);
    popup.innerHTML=`<div class="p-title" style="color:${color}">${ev.titre}</div><div class="p-date">📅 ${fmtR(ev.debut,ev.fin)}${ev.heure?' · '+ev.heure:''}</div><span class="p-badge" style="background:${meta.border};color:${color}">${meta.label}</span>${ev.lignes.length?`<div class="p-lignes">${ev.lignes.map(l=>`<span class="p-ligne">${l}</span>`).join('')}</div>`:''}${ev.details?`<div class="p-details">${ev.details}</div>`:''}`;
    popup.style.display='block';
    const pw=270,ph=140;
    let x=e.clientX+14,y=e.clientY+14;
    if(x+pw>window.innerWidth-10) x=e.clientX-pw-14;
    if(y+ph>window.innerHeight-10) y=e.clientY-ph-14;
    popup.style.left=x+'px'; popup.style.top=y+'px';
    if(pin) document.addEventListener('click',()=>{popPinned=false;popup.style.display='none';},{once:true});
}
function hidePopup(){if(!popPinned)popup.style.display='none';}

function renderCal() {
    document.getElementById('cal-month-label').textContent = `${MOIS[calM]} ${calY}`;
    const weeksEl = document.getElementById('cal-weeks');
    weeksEl.innerHTML = '';
    const EVENTS = buildEvents();
    const today = new Date();
    const firstDay = new Date(calY,calM,1);
    const gStart = addD(firstDay,-((firstDay.getDay()+6)%7));
    const lastDay = new Date(calY,calM+1,0);
    const gEnd = addD(lastDay,6-((lastDay.getDay()+6)%7));

    let cur = new Date(gStart);
    while(cur<=gEnd) {
        const wS=new Date(cur), wD=[];
        for(let i=0;i<7;i++){wD.push(new Date(cur));cur=addD(cur,1);}
        const wE=wD[6];
        const rowEl=document.createElement('div'); rowEl.className='cal-week-row';
        wD.forEach((day,di)=>{
            const cell=document.createElement('div');
            cell.className='cal-day'+(day.getMonth()!==calM?' other-month':'')+(di>=5?' we':'')+(sd(day,today)?' today':'');
            const num=document.createElement('div'); num.className='cal-day-num'; num.textContent=day.getDate();
            cell.appendChild(num); rowEl.appendChild(cell);
        });

        const wEvs=EVENTS.filter(ev=>{const d1=pd(ev.debut),d2=pd(ev.fin);return d1<=wE&&d2>=wS;})
            .sort((a,b)=>{const la=pd(a.fin)-pd(a.debut),lb=pd(b.fin)-pd(b.debut);return lb!==la?lb-la:pd(a.debut)-pd(b.debut);});

        const placed=[];
        wEvs.forEach(ev=>{
            const evS=pd(ev.debut),evE=pd(ev.fin);
            const cS=Math.max(0,Math.round(((evS<wS?wS:evS)-wS)/86400000));
            const cE=Math.min(6,Math.round(((evE>wE?wE:evE)-wS)/86400000));
            let row=0,found=false;
            while(!found){found=true;for(let c=cS;c<=cE;c++){if(placed.filter(p=>p.cS<=c&&p.cE>=c).map(p=>p.row).includes(row)){found=false;break;}}if(!found)row++;if(row>10)break;}
            placed.push({ev,row,cS,cE});
        });

        const layer=document.createElement('div'); layer.className='cal-events-layer';
        const CW=100/7;
        placed.forEach(({ev,row,cS,cE})=>{
            const color=gc(ev);
            const evS=pd(ev.debut),evE=pd(ev.fin);
            const sH=evS>=wS&&evS<=wE, eH=evE>=wS&&evE<=wE;
            const bar=document.createElement('div');
            bar.className='cal-event-bar'+(sH&&eH?' r-both':sH?' r-left':eH?' r-right':'');
            bar.dataset.evid=ev.id;
            bar.style.cssText=`background:${color};left:${cS*CW+0.2}%;width:${(cE-cS+1)*CW-0.4}%;top:${row*(BAR_H+BAR_GAP)}px;cursor:${ev.geste?'pointer':'default'}`;
            bar.textContent=sH?ev.titre:'';
            bar.addEventListener('mouseenter',e=>{document.querySelectorAll(`.cal-event-bar[data-evid="${ev.id}"]`).forEach(b=>{b.style.filter='brightness(1.15)';b.style.zIndex='10';});showPopup(e,ev);});
            bar.addEventListener('mouseleave',()=>{document.querySelectorAll(`.cal-event-bar[data-evid="${ev.id}"]`).forEach(b=>{b.style.filter='';b.style.zIndex='1';});hidePopup();});
            bar.addEventListener('click',e=>{e.stopPropagation();if(ev.geste)window.open(ev.geste,'_blank');else showPopup(e,ev,true);});
            layer.appendChild(bar);
        });
        rowEl.appendChild(layer);
        const maxRow=placed.length?Math.max(...placed.map(p=>p.row))+1:0;
        rowEl.style.minHeight=(72+Math.max(0,maxRow*(BAR_H+BAR_GAP)-28))+'px';
        weeksEl.appendChild(rowEl);
    }
}

document.getElementById('cal-prev').addEventListener('click',()=>{calM--;if(calM<0){calM=11;calY--;}renderCal();});
document.getElementById('cal-next').addEventListener('click',()=>{calM++;if(calM>11){calM=0;calY++;}renderCal();});

// ════════════════════════════════════════════════════════════
//  SETTINGS
// ════════════════════════════════════════════════════════════
function buildSettingsPanel() {
    const body = document.getElementById('settings-body');
    const CAT_CFG=[{key:'manif',label:'Manifestations',icon:'🎪',color:'#e74c3c'},{key:'travaux',label:'Travaux',icon:'🚧',color:'#e67e22'},{key:'horaires',label:'Horaires',icon:'🕐',color:'#8e44ad'},{key:'divers',label:'Divers',icon:'📋',color:'#27ae60'},{key:'news',label:'News',icon:'📣',color:'#c0392b'}];
    const STT_CFG=[{key:'deviation',label:'Déviation / Régulation',color:'#e67e22'},{key:'suppression',label:'Arrêt supprimé',color:'#e74c3c'},{key:'ok',label:'Pas de perturbation',color:'#27ae60'},{key:'info',label:'Information',color:'#2980b9'}];
    const tog=(id,checked)=>`<label class="stg-toggle"><input type="checkbox" id="${id}" ${checked?'checked':''}><span class="stg-slider"></span></label>`;
    body.innerHTML=`
        <div class="settings-section-title">Catégories</div>
        ${CAT_CFG.map(c=>`<div class="settings-row"><div class="settings-row-label"><div class="settings-dot" style="background:${c.color}"></div>${c.icon} ${c.label}</div>${tog('sc-'+c.key,CAL_S.cats[c.key])}</div>`).join('')}
        <div class="settings-section-title">Types d'événements</div>
        ${STT_CFG.map(s=>`<div class="settings-row"><div class="settings-row-label"><div class="settings-dot" style="background:${s.color}"></div>${s.label}</div>${tog('ss-'+s.key,CAL_S.statuts[s.key])}</div>`).join('')}
        <button class="settings-reset" id="stg-reset">↺ Réinitialiser</button>
    `;
    CAT_CFG.forEach(c=>{body.querySelector('#sc-'+c.key).addEventListener('change',function(){CAL_S.cats[c.key]=this.checked;saveS(CAL_S);renderCal();});});
    STT_CFG.forEach(s=>{body.querySelector('#ss-'+s.key).addEventListener('change',function(){CAL_S.statuts[s.key]=this.checked;saveS(CAL_S);renderCal();});});
    body.querySelector('#stg-reset').addEventListener('click',()=>{CAL_S=JSON.parse(JSON.stringify(CAL_DEF));saveS(CAL_S);buildSettingsPanel();renderCal();});
}

document.getElementById('cal-settings-btn').addEventListener('click',()=>{
    document.getElementById('settings-overlay').classList.toggle('open');
});
document.getElementById('settings-close').addEventListener('click',()=>{
    document.getElementById('settings-overlay').classList.remove('open');
});

buildTabs();
buildSearch();
buildSettingsPanel();
renderCal();
</script>
